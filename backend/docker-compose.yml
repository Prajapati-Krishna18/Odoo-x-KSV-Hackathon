version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vendorbridge_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vendorbridge_db
      POSTGRES_USER: vendorbridge
      POSTGRES_PASSWORD: vendorbridge_secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendorbridge -d vendorbridge_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vendorbridge_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
